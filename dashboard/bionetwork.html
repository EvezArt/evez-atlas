<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EvezBrain Unified Bionetwork</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #eee; }
    #graph { width: 100%; height: 80vh; border: 1px solid #333; }
    #panel { margin-top: 12px; padding: 8px; background: #1d1d1d; }
  </style>
</head>
<body>
  <h2>Unified EBAN + LBAN Bionetwork</h2>
  <svg id="graph"></svg>
  <div id="panel">Click a node for metrics.</div>

  <script>
    const ws = new WebSocket(`ws://${location.host}/ws/bionetwork`);
    const svg = d3.select("#graph");
    const width = window.innerWidth - 40;
    const height = window.innerHeight * 0.75;
    svg.attr("width", width).attr("height", height);

    function colorByTrust(trust) {
      const red = Math.floor((1 - trust) * 255);
      const green = Math.floor(trust * 255);
      return `rgb(${red},${green},80)`;
    }

    function render(graph) {
      svg.selectAll("*").remove();
      const sim = d3.forceSimulation(graph.nodes)
        .force("link", d3.forceLink(graph.edges).id(d => d.id).distance(120))
        .force("charge", d3.forceManyBody().strength(-300))
        .force("center", d3.forceCenter(width / 2, height / 2));

      const link = svg.append("g").selectAll("line")
        .data(graph.edges)
        .enter().append("line")
        .attr("stroke", "#99c")
        .attr("stroke-width", d => 1 + (d.synaptic_strength || 0.2) * 6);

      const node = svg.append("g").selectAll("circle")
        .data(graph.nodes)
        .enter().append("circle")
        .attr("r", 10)
        .attr("fill", d => colorByTrust(d.trust_score || 0.5))
        .on("click", (_, d) => {
          document.getElementById("panel").innerText = JSON.stringify(d, null, 2);
        });

      sim.on("tick", () => {
        link.attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);
        node.attr("cx", d => d.x).attr("cy", d => d.y);
      });
    }

    ws.onmessage = (event) => render(JSON.parse(event.data));
  </script>
</body>
</html>
