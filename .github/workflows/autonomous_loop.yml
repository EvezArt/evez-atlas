name: Atlas v3 Autonomous Heartbeat

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  atlas-cycle:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests numpy scipy
      - name: Run Atlas spectral heartbeat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ABLY_KEY: ${{ secrets.ABLY_KEY }}
        run: python runtime/spectral_heartbeat.py
