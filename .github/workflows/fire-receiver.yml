name: FIRE Cascade Receiver
on:
  repository_dispatch:
    types: [fire_cascade]
  workflow_dispatch:
jobs:
  fire-received:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Log FIRE event
        run: |
          echo "FIRE CASCADE RECEIVED at Atlas v3"
          mkdir -p data/fire
          echo '{"ts":"'$(date -u +%FT%TZ)'","event":"fire_cascade","source":"'${{ github.event.client_payload.source || 'manual' }}'"}' >> data/fire/events.jsonl
      - name: Run A012 Engine
        continue-on-error: true
        run: |
          if [ -f skills/a012_telemetry_coincidence_engine.py ]; then
            python skills/a012_telemetry_coincidence_engine.py --state data/hyperloop_state.json --mode full --output data/a012/predictions.jsonl 2>&1 || true
          else
            echo "A012 engine not found, skipping"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit results
        run: |
          git config user.name "EVEZ-OS Atlas"
          git config user.email "atlas@evez666.local"
          git add -A
          git diff --staged --quiet || git commit -m "fire-cascade: Atlas v3 cycle $(date -u +%FT%TZ)"
          git push || true
