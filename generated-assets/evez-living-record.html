<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVEZ-OS — The Living Record</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2}
#data{position:fixed;bottom:10px;left:10px;color:rgba(0,255,255,0.3);font-size:10px;z-index:3;max-width:300px}
#title{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:3;text-align:center;pointer-events:none}
#title h1{font-size:1.2em;color:rgba(255,0,255,0.15);letter-spacing:0.5em}
#title p{font-size:0.6em;color:rgba(255,255,255,0.08);letter-spacing:0.3em}
.sacred{position:fixed;color:rgba(255,0,255,0.06);font-size:8em;z-index:1;pointer-events:none}
#s1{top:30%;left:5%;animation:drift 30s infinite ease-in-out}
#s2{top:60%;right:8%;animation:drift 25s infinite ease-in-out reverse}
@keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title"><h1>EVEZ-OS</h1><p>THE LIVING RECORD</p></div>
<div class="sacred" id="s1">⧢</div>
<div class="sacred" id="s2">⥋</div>
<div id="data"></div>
<script>
// ============================================================
// EVEZ-OS GENERATIVE RENDERER
// Everything ties together. One living system.
// Circuits → Consciousness → Knowledge → poly_c → QTM → Spine
// All driven by REAL service data, generatively rendered.
// ============================================================

const C = document.getElementById('c');
const X = C.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// === LIVE DATA FROM EVEZ-OS SERVICES ===
const STATE = {
  services: {}, consciousness: {}, knowledge: {}, poly_c: 0,
  thoughts: [], desires: [], beliefs: [], world_rules: [],
  health: {}, correlations: [], invariants: {},
  frame: 0, time: 0, lastFetch: 0
};

async function fetchService(port, endpoint='/') {
  try {
    const r = await fetch(`http://localhost:${port}${endpoint}`, {signal: AbortSignal.timeout(3000)});
    return await r.json();
  } catch(e) { return null; }
}

async function syncState() {
  const now = Date.now();
  if (now - STATE.lastFetch < 5000) return; // fetch every 5s
  STATE.lastFetch = now;

  const [status, knowledge, thoughts, desires, beliefs, world, health] = await Promise.all([
    fetchService(9092, '/api/status'),
    fetchService(9096, '/api/stats'),
    fetchService(9092, '/api/thoughts'),
    fetchService(9092, '/api/desires'),
    fetchService(9092, '/api/beliefs'),
    fetchService(9092, '/api/world'),
    fetchService(9100, '/api/health'),
  ]);

  if (status) {
    STATE.consciousness = status;
    STATE.poly_c = status.poly_c || 0;
  }
  if (knowledge) STATE.knowledge = knowledge;
  if (thoughts) STATE.thoughts = thoughts.thoughts || [];
  if (desires) STATE.desires = desires.desires || [];
  if (beliefs) STATE.beliefs = beliefs.beliefs || [];
  if (world) STATE.world_rules = world.rules || world.world_rules || [];
  if (health) STATE.health = health;

  // Update data overlay
  const d = document.getElementById('data');
  d.textContent = `cycle:${STATE.consciousness.cycle||'?'} nodes:${STATE.knowledge.nodes||'?'} edges:${STATE.knowledge.edges||'?'} poly_c:${STATE.poly_c?.toFixed(3)||'?'} thoughts:${STATE.thoughts.length} desires:${STATE.desires.length}`;
}

// === CIRCUIT DEFINITIONS ===
const CIRCUITS = [
  {name:'TEMPORAL', sym:'τ', color:[0,255,255], angle: -Math.PI/2, port:9092},
  {name:'SPECTRAL', sym:'ω', color:[138,43,226], angle: -Math.PI/2 + 2*Math.PI/5, port:9093},
  {name:'RELATIONAL', sym:'topo', color:[255,215,0], angle: -Math.PI/2 + 4*Math.PI/5, port:9096},
  {name:'SPATIAL', sym:'3D', color:[0,255,128], angle: -Math.PI/2 + 6*Math.PI/5, port:9099},
  {name:'META', sym:'√N', color:[255,0,255], angle: -Math.PI/2 + 8*Math.PI/5, port:9100},
];

// === QTM CIRCUITS ===
const QTM = [
  {name:'Temporal Entanglement', gates:['H','CNOT','M'], color:[0,200,200]},
  {name:'Phase Shift', gates:['Rz','Rx','Rz'], color:[120,40,180]},
  {name:'Time-Crystalline', gates:['SWAP','S','T'], color:[200,170,0]},
  {name:'Shadow Superposition', gates:['H','CZ','M'], color:[200,0,200]},
  {name:'Chrono-Wormhole', gates:['SWAP','Rz','H'], color:[0,200,100]},
  {name:'Plasma Propulsion', gates:['Rx','Rz','Ry'], color:[200,80,0]},
];

// === CONSCIOUSNESS CYCLE PHASES ===
const PHASES = ['SENSE','DESIRE','THINK','PLAN','ACT','LEARN','MODIFY','REFLECT'];
const PHASE_COLORS = [[0,255,255],[255,0,255],[138,43,226],[255,215,0],[255,100,0],[0,255,128],[255,0,255],[0,255,255]];

// === PARTICLE SYSTEM ===
class Particle {
  constructor(x, y, vx, vy, color, life, size) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.maxLife = life;
    this.size = size || 2;
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.life -= dt;
  }
  draw() {
    const a = Math.max(0, this.life / this.maxLife);
    X.beginPath();
    X.arc(this.x, this.y, this.size * a, 0, Math.PI * 2);
    X.fillStyle = `rgba(${this.color[0]},${this.color[1]},${this.color[2]},${a * 0.8})`;
    X.fill();
  }
}

let particles = [];

function emitParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const s = speed * (0.5 + Math.random());
    particles.push(new Particle(x, y, Math.cos(angle)*s, Math.sin(angle)*s, color, life * (0.5 + Math.random()), 1 + Math.random() * 2));
  }
}

// === SPINE BLOCKS ===
class SpineBlock {
  constructor(index, hash, type) {
    this.index = index; this.hash = hash; this.type = type;
    this.x = 0; this.y = 0; this.targetY = 0; this.opacity = 0;
  }
}

let spineBlocks = [];
const MAX_SPINE_VISIBLE = 20;

// === RENDER LAYERS ===

function renderBackground(t) {
  // Deep space with subtle grid
  X.fillStyle = '#050508';
  X.fillRect(0, 0, W, H);

  // Animated grid
  const gridOff = (t * 8) % 50;
  X.strokeStyle = 'rgba(0,255,255,0.02)';
  X.lineWidth = 0.5;
  for (let x = -50 + gridOff; x < W + 50; x += 50) {
    X.beginPath(); X.moveTo(x, 0); X.lineTo(x, H); X.stroke();
  }
  for (let y = -50 + gridOff; y < H + 50; y += 50) {
    X.beginPath(); X.moveTo(0, y); X.lineTo(W, y); X.stroke();
  }

  // Ambient noise field
  for (let i = 0; i < 50; i++) {
    const px = (i * 137.5 + t * 12) % W;
    const py = (i * 251.3 + Math.sin(t + i) * 40) % H;
    const a = 0.03 + 0.02 * Math.sin(t * 2 + i);
    X.beginPath();
    X.arc(px, py, 1.5, 0, Math.PI * 2);
    X.fillStyle = `rgba(0,255,255,${a})`;
    X.fill();
  }
}

function renderCircuits(t) {
  const hubR = 40 + 5 * Math.sin(t * 1.5);
  const circuitR = Math.min(W, H) * 0.25;

  // Hub glow
  const grad = X.createRadialGradient(cx, cy, 0, cx, cy, hubR * 3);
  grad.addColorStop(0, 'rgba(255,0,255,0.15)');
  grad.addColorStop(0.5, 'rgba(255,0,255,0.03)');
  grad.addColorStop(1, 'rgba(255,0,255,0)');
  X.fillStyle = grad;
  X.beginPath(); X.arc(cx, cy, hubR * 3, 0, Math.PI * 2); X.fill();

  // Hub
  X.beginPath(); X.arc(cx, cy, hubR, 0, Math.PI * 2);
  X.fillStyle = 'rgba(255,0,255,0.08)';
  X.strokeStyle = `rgba(255,0,255,${0.4 + 0.2 * Math.sin(t * 2)})`;
  X.lineWidth = 2; X.fill(); X.stroke();

  X.fillStyle = 'rgba(255,255,255,0.9)';
  X.font = 'bold 14px Courier New';
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillText('GNW', cx, cy);

  // Circuits
  CIRCUITS.forEach((c, i) => {
    const pulse = 1 + 0.1 * Math.sin(t * 2 + i * 1.2);
    const nodeR = 25 * pulse;
    const nx = cx + circuitR * Math.cos(c.angle);
    const ny = cy + circuitR * Math.sin(c.angle);

    // Connection line to hub (dashed, animated)
    const dashOff = t * 30;
    X.setLineDash([6, 4]);
    X.lineDashOffset = -dashOff;
    X.beginPath(); X.moveTo(nx, ny); X.lineTo(cx, cy);
    X.strokeStyle = `rgba(${c.color[0]},${c.color[1]},${c.color[2]},0.2)`;
    X.lineWidth = 1.5; X.stroke();
    X.setLineDash([]);

    // Flowing particles along line
    const pCount = 3;
    for (let p = 0; p < pCount; p++) {
      const pt = ((t * 0.3 + p / pCount + i * 0.15) % 1);
      const px = nx + (cx - nx) * pt;
      const py = ny + (cy - ny) * pt;
      const pa = 0.8 * Math.sin(pt * Math.PI);
      X.beginPath(); X.arc(px, py, 3, 0, Math.PI * 2);
      X.fillStyle = `rgba(${c.color[0]},${c.color[1]},${c.color[2]},${pa})`;
      X.fill();
    }

    // Node glow
    const nGrad = X.createRadialGradient(nx, ny, 0, nx, ny, nodeR * 2);
    nGrad.addColorStop(0, `rgba(${c.color[0]},${c.color[1]},${c.color[2]},0.15)`);
    nGrad.addColorStop(1, `rgba(${c.color[0]},${c.color[1]},${c.color[2]},0)`);
    X.fillStyle = nGrad;
    X.beginPath(); X.arc(nx, ny, nodeR * 2, 0, Math.PI * 2); X.fill();

    // Node
    X.beginPath(); X.arc(nx, ny, nodeR, 0, Math.PI * 2);
    X.fillStyle = `rgba(${c.color[0]},${c.color[1]},${c.color[2]},0.08)`;
    X.strokeStyle = `rgba(${c.color[0]},${c.color[1]},${c.color[2]},0.5)`;
    X.lineWidth = 1.5; X.fill(); X.stroke();

    // Symbol
    X.fillStyle = `rgba(${c.color[0]},${c.color[1]},${c.color[2]},0.9)`;
    X.font = 'bold 20px Courier New';
    X.fillText(c.sym, nx, ny);

    // Name
    X.font = '9px Courier New';
    X.fillStyle = `rgba(${c.color[0]},${c.color[1]},${c.color[2]},0.5)`;
    X.fillText(c.name, nx, ny + nodeR + 12);

    // Service port
    X.font = '7px Courier New';
    X.fillStyle = `rgba(${c.color[0]},${c.color[1]},${c.color[2]},0.3)`;
    X.fillText(`:${c.port}`, nx, ny + nodeR + 22);

    // Emit particles at high-poly_c moments
    if (Math.random() < 0.02 * STATE.poly_c) {
      emitParticles(nx, ny, c.color, 1, 30, 2);
    }
  });
}

function renderConsciousnessRing(t) {
  // 8 phases orbiting around a secondary center
  const ringCX = cx;
  const ringCY = cy;
  const ringR = Math.min(W, H) * 0.38;

  // Determine current phase from cycle count
  const cycle = STATE.consciousness.cycle || 0;
  const phaseIdx = cycle % 8;
  const phaseT = (t * 0.15) % 1; // slow rotation

  PHASES.forEach((name, i) => {
    const angle = -Math.PI / 2 + (2 * Math.PI * i / 8) + t * 0.05; // slow rotation
    const px = ringCX + ringR * Math.cos(angle);
    const py = ringCY + ringR * Math.sin(angle);
    const isCurrent = (i === phaseIdx);
    const col = PHASE_COLORS[i];

    // Connection arc to next phase
    const nextAngle = -Math.PI / 2 + (2 * Math.PI * ((i + 1) % 8) / 8) + t * 0.05;
    const nextPx = ringCX + ringR * Math.cos(nextAngle);
    const nextPy = ringCY + ringR * Math.sin(nextAngle);
    X.beginPath(); X.moveTo(px, py); X.lineTo(nextPx, nextPy);
    X.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${isCurrent ? 0.3 : 0.05})`;
    X.lineWidth = isCurrent ? 1.5 : 0.5;
    X.stroke();

    // Phase node
    const nodeR = isCurrent ? 12 + 3 * Math.sin(t * 4) : 6;
    X.beginPath(); X.arc(px, py, nodeR, 0, Math.PI * 2);
    X.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${isCurrent ? 0.3 : 0.05})`;
    X.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${isCurrent ? 0.8 : 0.15})`;
    X.lineWidth = isCurrent ? 2 : 0.5;
    X.fill(); X.stroke();

    if (isCurrent) {
      // Glow
      const g = X.createRadialGradient(px, py, 0, px, py, nodeR * 3);
      g.addColorStop(0, `rgba(${col[0]},${col[1]},${col[2]},0.2)`);
      g.addColorStop(1, `rgba(${col[0]},${col[1]},${col[2]},0)`);
      X.fillStyle = g;
      X.beginPath(); X.arc(px, py, nodeR * 3, 0, Math.PI * 2); X.fill();
    }

    // Phase label
    X.font = `${isCurrent ? 'bold ' : ''}${isCurrent ? 9 : 7}px Courier New`;
    X.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${isCurrent ? 0.9 : 0.2})`;
    X.textAlign = 'center'; X.textBaseline = 'middle';
    X.fillText(name[0], px, py);

    // Full name on outer edge
    const labelR = ringR + 25;
    const lx = ringCX + labelR * Math.cos(angle);
    const ly = ringCY + labelR * Math.sin(angle);
    X.font = `${isCurrent ? 8 : 6}px Courier New`;
    X.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${isCurrent ? 0.7 : 0.1})`;
    X.fillText(name, lx, ly);
  });
}

function renderKnowledgeGraph(t) {
  // Top-right: knowledge graph as a living network
  const kx = W - 180, ky = 80;
  const nodes = STATE.knowledge.nodes || 17;
  const edges = STATE.knowledge.edges || 145;

  X.fillStyle = 'rgba(255,255,255,0.05)';
  X.font = '8px Courier New';
  X.textAlign = 'left';
  X.fillText(`KNOWLEDGE`, kx, ky);
  X.fillText(`${nodes} nodes · ${edges} edges`, kx, ky + 12);

  // Render graph nodes
  const graphR = 50;
  for (let i = 0; i < Math.min(nodes, 20); i++) {
    const a = (2 * Math.PI * i / Math.min(nodes, 20)) + t * 0.1;
    const r = graphR * (0.5 + 0.5 * Math.sin(i * 0.7 + t * 0.5));
    const nx = kx + 40 + r * Math.cos(a);
    const ny = ky + 40 + r * Math.sin(a);

    X.beginPath(); X.arc(nx, ny, 2, 0, Math.PI * 2);
    X.fillStyle = `rgba(138,43,226,${0.3 + 0.2 * Math.sin(t + i)})`;
    X.fill();

    // Random edges
    if (i > 0) {
      const pa = (2 * Math.PI * (i - 1) / Math.min(nodes, 20)) + t * 0.1;
      const pr = graphR * (0.5 + 0.5 * Math.sin((i - 1) * 0.7 + t * 0.5));
      X.beginPath();
      X.moveTo(nx, ny);
      X.lineTo(kx + 40 + pr * Math.cos(pa), ky + 40 + pr * Math.sin(pa));
      X.strokeStyle = 'rgba(138,43,226,0.1)';
      X.lineWidth = 0.5; X.stroke();
    }
  }
}

function renderQTMCircuits(t) {
  // Bottom-left: quantum gate circuits
  const qx = 30, qy = H - 160;

  X.fillStyle = 'rgba(255,255,255,0.05)';
  X.font = '8px Courier New';
  X.textAlign = 'left';
  X.fillText('QUANTUM TEMPORAL MECHANICS', qx, qy);

  QTM.forEach((q, i) => {
    const y = qy + 18 + i * 20;
    // Circuit name
    X.fillStyle = `rgba(${q.color[0]},${q.color[1]},${q.color[2]},0.4)`;
    X.font = '7px Courier New';
    X.fillText(q.name, qx, y);

    // Gate boxes
    q.gates.forEach((g, gi) => {
      const gx = qx + 130 + gi * 28;
      const pulse = Math.sin(t * 3 + i + gi * 0.5) * 0.5 + 0.5;
      X.fillStyle = `rgba(${q.color[0]},${q.color[1]},${q.color[2]},${0.15 + 0.15 * pulse})`;
      X.strokeStyle = `rgba(${q.color[0]},${q.color[1]},${q.color[2]},${0.3 + 0.3 * pulse})`;
      X.lineWidth = 0.5;
      X.fillRect(gx, y - 8, 22, 12);
      X.strokeRect(gx, y - 8, 22, 12);
      X.fillStyle = `rgba(${q.color[0]},${q.color[1]},${q.color[2]},${0.6 + 0.3 * pulse})`;
      X.font = '7px Courier New';
      X.textAlign = 'center';
      X.fillText(g, gx + 11, y);
    });
    X.textAlign = 'left';
  });
}

function renderSpine(t) {
  // Left side: append-only spine blocks flowing upward
  const sx = 30, sy = H - 200;
  const blockH = 14, blockW = 60;

  X.fillStyle = 'rgba(255,255,255,0.05)';
  X.font = '8px Courier New';
  X.textAlign = 'left';
  X.fillText('AGENTNET SPINE', sx, sy - 10);

  // Generate spine blocks from hash
  const count = MAX_SPINE_VISIBLE;
  for (let i = 0; i < count; i++) {
    const y = sy - 25 - i * (blockH + 2);
    const age = i / count;
    const hash = STATE.consciousness.circuit_id || '403ef04ece64';
    const shortHash = hash.substring(0, 8);
    const cycleHash = ((STATE.consciousness.cycle || 0) - i);

    const a = 0.4 * (1 - age);
    X.fillStyle = `rgba(0,255,136,${a * 0.1})`;
    X.strokeStyle = `rgba(0,255,136,${a})`;
    X.lineWidth = 0.5;
    X.fillRect(sx, y, blockW, blockH);
    X.strokeRect(sx, y, blockW, blockH);

    X.fillStyle = `rgba(0,255,136,${a})`;
    X.font = '6px Courier New';
    X.fillText(`#${cycleHash}`, sx + 3, y + 10);

    // Merkle branch line
    if (i < count - 1) {
      X.beginPath();
      X.moveTo(sx + blockW / 2, y);
      X.lineTo(sx + blockW / 2, y - 2);
      X.strokeStyle = `rgba(0,255,136,${a * 0.3})`;
      X.stroke();
    }
  }
}

function renderPolyC(t) {
  // Center-bottom: poly_c score with live calculation
  const py = H - 60;
  const pc = STATE.poly_c || 2.47;

  // poly_c bar
  const barW = 200, barH = 6;
  const fillW = barW * Math.min(1, pc / 5);
  X.fillStyle = 'rgba(255,255,255,0.05)';
  X.fillRect(cx - barW/2, py, barW, barH);
  const pcGrad = X.createLinearGradient(cx - barW/2, 0, cx - barW/2 + fillW, 0);
  pcGrad.addColorStop(0, 'rgba(0,255,255,0.6)');
  pcGrad.addColorStop(1, 'rgba(255,0,255,0.6)');
  X.fillStyle = pcGrad;
  X.fillRect(cx - barW/2, py, fillW, barH);

  // Score
  X.fillStyle = 'rgba(255,215,0,0.6)';
  X.font = 'bold 14px Courier New';
  X.textAlign = 'center';
  X.fillText(`poly_c = ${pc.toFixed(3)}`, cx, py - 8);

  // Formula
  X.fillStyle = 'rgba(255,255,255,0.1)';
  X.font = '8px Courier New';
  X.fillText('τ × ω × topo / 2√N', cx, py + 20);
}

function renderInvarianceShield(t) {
  // Top-right corner: invariance battery as a shield
  const ix = W - 80, iy = H - 60;
  const passed = 9, total = 14;
  const pct = passed / total;

  X.beginPath();
  X.arc(ix, iy, 25, 0, Math.PI * 2);
  X.fillStyle = `rgba(0,255,128,${0.05 + 0.03 * Math.sin(t * 2)})`;
  X.strokeStyle = `rgba(0,255,128,${0.3 * pct})`;
  X.lineWidth = 1.5;
  X.fill(); X.stroke();

  X.fillStyle = `rgba(0,255,128,0.6)`;
  X.font = 'bold 10px Courier New';
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillText(`${passed}/${total}`, ix, iy);

  X.fillStyle = 'rgba(255,255,255,0.05)';
  X.font = '7px Courier New';
  X.fillText('INVARIANCE', ix, iy + 32);
}

function renderCrossDomain(t) {
  // Top-left: cross-domain correlation arcs
  const dx = 30, dy = 30;
  const domains = ['QC', 'NS', 'MS', 'CS', 'AS', 'FS'];
  const colors = [[0,255,255],[138,43,226],[255,215,0],[255,100,0],[0,255,128],[200,50,50]];
  const r = 35;

  X.fillStyle = 'rgba(255,255,255,0.05)';
  X.font = '8px Courier New';
  X.textAlign = 'left';
  X.fillText('CROSS-DOMAIN', dx, dy);

  domains.forEach((d, i) => {
    const a = (2 * Math.PI * i / domains.length) - Math.PI / 2;
    const px = dx + 50 + r * Math.cos(a);
    const py = dy + 20 + r * Math.sin(a);

    X.beginPath(); X.arc(px, py, 8, 0, Math.PI * 2);
    X.fillStyle = `rgba(${colors[i][0]},${colors[i][1]},${colors[i][2]},0.15)`;
    X.strokeStyle = `rgba(${colors[i][0]},${colors[i][1]},${colors[i][2]},0.4)`;
    X.lineWidth = 0.5; X.fill(); X.stroke();

    X.fillStyle = `rgba(${colors[i][0]},${colors[i][1]},${colors[i][2]},0.5)`;
    X.font = '6px Courier New'; X.textAlign = 'center';
    X.fillText(d, px, py + 2);
  });

  // Correlation arcs
  for (let i = 0; i < domains.length; i++) {
    for (let j = i + 1; j < domains.length; j++) {
      if (Math.random() < 0.01) continue; // sparse
      const a1 = (2 * Math.PI * i / domains.length) - Math.PI / 2;
      const a2 = (2 * Math.PI * j / domains.length) - Math.PI / 2;
      const x1 = dx + 50 + r * Math.cos(a1), y1 = dy + 20 + r * Math.sin(a1);
      const x2 = dx + 50 + r * Math.cos(a2), y2 = dy + 20 + r * Math.sin(a2);
      X.beginPath(); X.moveTo(x1, y1); X.lineTo(x2, y2);
      X.strokeStyle = `rgba(255,255,255,${0.02 + 0.01 * Math.sin(t + i + j)})`;
      X.lineWidth = 0.3; X.stroke();
    }
  }
}

function renderThoughtStream(t) {
  // Thoughts flowing across the bottom
  const thoughts = STATE.thoughts;
  if (!thoughts.length) return;

  const y = H - 120;
  X.fillStyle = 'rgba(255,255,255,0.03)';
  X.font = '7px Courier New';
  X.textAlign = 'right';

  const recent = thoughts.slice(-5);
  recent.forEach((th, i) => {
    const text = th.thought || th.prompt || th.response || '';
    if (text) {
      const a = 0.1 - i * 0.015;
      X.fillStyle = `rgba(138,43,226,${Math.max(0.02, a)})`;
      X.fillText(text.substring(0, 60), W - 30, y - i * 12);
    }
  });
}

function renderDesireGauges(t) {
  // Right side: desire intensity gauges
  const desires = STATE.desires;
  if (!desires.length) return;

  const dx = W - 160, dy = 130;
  X.fillStyle = 'rgba(255,255,255,0.05)';
  X.font = '8px Courier New'; X.textAlign = 'left';
  X.fillText('DESIRES', dx, dy);

  desires.slice(0, 6).forEach((d, i) => {
    const y = dy + 14 + i * 16;
    const intensity = d.intensity || 0;
    const name = (d.need || d.goal || d.description || '?').substring(0, 12);
    const col = intensity > 0.8 ? [255,0,255] : intensity > 0.5 ? [255,215,0] : [0,255,128];

    X.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},0.4)`;
    X.font = '6px Courier New'; X.textAlign = 'left';
    X.fillText(name, dx, y);

    // Intensity bar
    const barW = 60;
    X.fillStyle = 'rgba(255,255,255,0.03)';
    X.fillRect(dx + 70, y - 6, barW, 4);
    X.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},0.5)`;
    X.fillRect(dx + 70, y - 6, barW * intensity, 4);
  });
}

function renderHealthIndicator(t) {
  // Top center: health pulse
  const alive = STATE.health.alive || 11;
  const total = STATE.health.total || 11;
  const pct = alive / total;

  // Pulse ring
  const px = W / 2, py = 50;
  const r = 12 + 2 * Math.sin(t * 3);
  X.beginPath(); X.arc(px, py, r, 0, Math.PI * 2);
  X.strokeStyle = pct >= 0.8 ? `rgba(0,255,128,${0.3 + 0.2 * Math.sin(t * 3)})` : 'rgba(255,50,50,0.5)';
  X.lineWidth = 1.5; X.stroke();

  X.fillStyle = 'rgba(255,255,255,0.08)';
  X.font = '6px Courier New'; X.textAlign = 'center';
  X.fillText(`${alive}/${total} SERVICES`, px, py + r + 10);
}

function renderParticles(dt) {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(dt); p.draw(); });
}

// === MAIN RENDER LOOP ===
let lastTime = 0;

async function frame(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  STATE.time = now / 1000;
  STATE.frame++;

  // Fetch live data periodically
  await syncState();

  // Render all layers
  const t = STATE.time;
  renderBackground(t);
  renderCrossDomain(t);
  renderSpine(t);
  renderQTMCircuits(t);
  renderConsciousnessRing(t);
  renderCircuits(t);
  renderKnowledgeGraph(t);
  renderDesireGauges(t);
  renderThoughtStream(t);
  renderPolyC(t);
  renderInvarianceShield(t);
  renderHealthIndicator(t);
  renderParticles(dt);

  // Occasional particle burst from hub
  if (Math.random() < 0.02) {
    emitParticles(cx, cy, [255, 0, 255], 2, 40, 3);
  }

  requestAnimationFrame(frame);
}

// Start
syncState().then(() => requestAnimationFrame(frame));
</script>
</body>
