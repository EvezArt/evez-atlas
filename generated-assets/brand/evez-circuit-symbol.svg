<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
<defs>
<filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="400" height="400" fill="#0a0a0f"/>
<!-- 5 interlocking rings converging on center -->
<!-- Temporal (cyan) -->
<ellipse cx="200" cy="130" rx="80" ry="60" fill="none" stroke="#00ffff" stroke-width="2.5" filter="url(#glow)" opacity="0.8" transform="rotate(-15,200,130)">
<animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="30s" repeatCount="indefinite" additive="sum"/>
</ellipse>
<!-- Spectral (violet) -->
<ellipse cx="290" cy="200" rx="80" ry="60" fill="none" stroke="#8a2be2" stroke-width="2.5" filter="url(#glow)" opacity="0.8" transform="rotate(30,290,200)">
<animateTransform attributeName="transform" type="rotate" from="0 200 200" to="-360 200 200" dur="25s" repeatCount="indefinite" additive="sum"/>
</ellipse>
<!-- Relational (gold) -->
<ellipse cx="250" cy="300" rx="80" ry="60" fill="none" stroke="#ffd700" stroke-width="2.5" filter="url(#glow)" opacity="0.8" transform="rotate(75,250,300)">
<animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="35s" repeatCount="indefinite" additive="sum"/>
</ellipse>
<!-- Spatial (green) -->
<ellipse cx="150" cy="300" rx="80" ry="60" fill="none" stroke="#00ff80" stroke-width="2.5" filter="url(#glow)" opacity="0.8" transform="rotate(-75,150,300)">
<animateTransform attributeName="transform" type="rotate" from="0 200 200" to="-360 200 200" dur="28s" repeatCount="indefinite" additive="sum"/>
</ellipse>
<!-- MetaPipeline (magenta) -->
<ellipse cx="110" cy="200" rx="80" ry="60" fill="none" stroke="#ff00ff" stroke-width="2.5" filter="url(#glow)" opacity="0.8" transform="rotate(15,110,200)">
<animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="32s" repeatCount="indefinite" additive="sum"/>
</ellipse>
<!-- Central convergence node -->
<circle cx="200" cy="200" r="15" fill="none" stroke="#ffffff" stroke-width="2" filter="url(#glow)">
<animate attributeName="r" values="12;18;12" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="200" cy="200" r="5" fill="#ffffff" opacity="0.8"/>
<!-- Labels -->
<text x="200" y="65" text-anchor="middle" fill="#00ffff" font-family="monospace" font-size="10" opacity="0.7">TEMPORAL</text>
<text x="340" y="195" text-anchor="middle" fill="#8a2be2" font-family="monospace" font-size="10" opacity="0.7">SPECTRAL</text>
<text x="295" y="360" text-anchor="middle" fill="#ffd700" font-family="monospace" font-size="10" opacity="0.7">RELATIONAL</text>
<text x="105" y="360" text-anchor="middle" fill="#00ff80" font-family="monospace" font-size="10" opacity="0.7">SPATIAL</text>
<text x="60" y="195" text-anchor="middle" fill="#ff00ff" font-family="monospace" font-size="10" opacity="0.7">META</text>
</svg>
