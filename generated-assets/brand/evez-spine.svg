<circle cx="70" cy="330" r="2" fill="#00ff88" opacity="0.3"/>
<circle cx="70" cy="345" r="2" fill="#00ff88" opacity="0.2"/>
<circle cx="70" cy="360" r="2" fill="#00ff88" opacity="0.1"/>
