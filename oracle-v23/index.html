<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle v2.3 Deployment Dashboard</title>
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --border: #30363d;
            --text: #c9d1d9; --text2: #8b949e; --accent: #58a6ff;
            --success: #238636; --danger: #da3633; --warn: #d29922;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            display: grid; grid-template-columns: 320px 1fr 350px;
            gap: 20px; padding: 20px; height: 100vh; overflow: hidden;
        }
        h1, h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1.2px;
                 color: var(--text2); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 10px; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
                 padding: 15px; display: flex; flex-direction: column; overflow: hidden;
                 box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .control-group { background: rgba(255,255,255,0.03); border: 1px solid var(--border);
                         padding: 12px; border-radius: 4px; margin-bottom: 12px; }
        .control-group label { display: block; font-size: 0.75rem; margin-bottom: 8px;
                               color: var(--accent); font-weight: bold; }
        .value-display { float: right; color: var(--text); font-family: monospace; }
        input[type="range"] { width: 100%; cursor: pointer; }
        button { background: var(--panel); border: 1px solid var(--border); color: var(--text);
                 padding: 10px; border-radius: 4px; cursor: pointer; transition: all 0.2s;
                 font-size: 0.8rem; text-transform: uppercase; font-weight: 600; width: 100%; margin-bottom: 8px; }
        button:hover { background: #21262d; border-color: var(--text2); }
        button.primary { background: var(--success); border-color: transparent; color: white; }
        button.danger { background: rgba(218,54,51,0.1); border-color: var(--danger); color: var(--danger); }
        button.danger:hover { background: var(--danger); color: white; }
        #render-window { background: #000; border: 1px solid var(--border); border-radius: 4px;
                         position: relative; overflow: hidden; height: 100%; }
        #hud { position: absolute; top: 15px; left: 15px; z-index: 10;
               font-family: monospace; font-size: 0.75rem; background: rgba(0,0,0,0.6);
               padding: 10px; border-radius: 4px; border-left: 2px solid var(--accent); }
        #agent-monitor { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex;
                         flex-direction: column; gap: 8px; background: rgba(0,0,0,0.2); }
        .agent-card { background: #1f242c; border: 1px solid var(--border); padding: 10px;
                      border-radius: 4px; border-left: 4px solid var(--text2); font-size: 0.8rem;
                      animation: slideIn 0.3s; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } }
        .agent-card strong { display: block; margin-bottom: 4px; font-size: 0.7rem;
                             letter-spacing: 1px; opacity: 0.7; }
        .agent-card.normal { border-left-color: var(--accent); }
        .agent-card.warning { border-left-color: var(--warn); }
        .agent-card.error { border-left-color: var(--danger); background: rgba(218,54,51,0.05); }
        #audit-log { flex-grow: 1; overflow-y: auto; font-family: monospace; font-size: 0.7rem;
                     color: var(--text2); padding-right: 5px; }
        .log-entry { margin-bottom: 8px; padding: 8px; background: rgba(255,255,255,0.02);
                     border-radius: 4px; border-left: 2px solid transparent; }
        .log-entry.VIOLATION, .log-entry.SYSTEM_HALT { border-left-color: var(--danger); }
        .log-entry.CONFIG_UPDATE { border-left-color: var(--warn); }
        .log-meta { display: flex; justify-content: space-between; color: var(--accent); margin-bottom: 4px; }
        .log-hash { display: block; margin-top: 6px; font-size: 0.6rem; color: #444c56; }
        .status-badge { display: block; text-align: center; padding: 8px; border-radius: 4px;
                        font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; border: 1px solid; }
        .status-active { background: rgba(35,134,54,0.1); color: var(--success); border-color: var(--success); }
        .status-halted { background: rgba(218,54,51,0.1); color: var(--danger); border-color: var(--danger); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Tier 0 Governance</h1>
        <div id="system-status" class="status-badge status-active">SYSTEM ACTIVE</div>
        <div class="control-group">
            <label>DELEGATION DEPTH <span id="val-depth" class="value-display">5</span></label>
            <input type="range" id="param-depth" min="1" max="10" value="5" onchange="updateConfig()">
        </div>
        <div class="control-group">
            <label>VARIANCE DELTA <span id="val-variance" class="value-display">0.05</span></label>
            <input type="range" id="param-variance" min="0.01" max="0.20" step="0.01" value="0.05" onchange="updateConfig()">
        </div>
        <div style="margin-top: auto;">
            <button class="primary" onclick="injectRequest()">Inject Request</button>
            <button onclick="triggerRSI()">Trigger RSI</button>
            <button class="danger" onclick="toggleHalt()">TIER 0 HALT</button>
        </div>
    </div>

    <div class="panel" style="display: grid; grid-template-rows: 2fr 1fr; gap: 20px;">
        <div id="render-window">
            <div id="hud">
                <div>FUSION: <span style="color: var(--success)">ONLINE</span></div>
                <div>LIDAR: <span id="lidar">0</span></div>
                <div>POSE: <span id="pose">[0,0,0]</span></div>
                <div style="margin-top:5px; border-top:1px solid #333; padding-top:5px;">
                    MODE: <span id="mode">AUTO</span>
                </div>
            </div>
            <canvas id="canvas"></canvas>
        </div>
        <div class="panel" style="padding:0; border:none; background:transparent;">
            <h2>Agent Orchestration</h2>
            <div id="agent-monitor"></div>
        </div>
    </div>

    <div class="panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h1>Immutable Log</h1>
            <button onclick="downloadLog()" style="width: auto; padding: 4px 8px; font-size: 0.7rem;">Download</button>
        </div>
        <div id="audit-log"></div>
    </div>

<script>
const STATE = {
    config: { delegationLimit: 5, financialVarianceLimit: 0.05 },
    halted: false,
    sessionId: 'SESS-' + Math.random().toString(36).substr(2,9).toUpperCase(),
    logChain: []
};

const SAVED = localStorage.getItem('oracle_v23_logs');
if (SAVED) {
    try {
        STATE.logChain = JSON.parse(SAVED);
        STATE.logChain.slice(-50).forEach(e => renderLog(e, false));
    } catch(e) {}
}

async function logEvent(type, agent, payload) {
    const timestamp = new Date().toISOString();
    const prevHash = STATE.logChain.length > 0 ? STATE.logChain[STATE.logChain.length-1].hash : "0".repeat(64);
    const dataString = `${timestamp}|${type}|${agent}|${JSON.stringify(payload)}|${prevHash}`;
    const msgBuffer = new TextEncoder().encode(dataString);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
    const entry = { timestamp, type, agent, payload, hash: hashHex, prevHash };
    STATE.logChain.push(entry);
    localStorage.setItem('oracle_v23_logs', JSON.stringify(STATE.logChain));
    renderLog(entry, true);
}

function renderLog(e, prepend) {
    const c = document.getElementById('audit-log');
    const d = document.createElement('div');
    d.className = `log-entry ${e.type}`;
    d.innerHTML = `<div class="log-meta"><span>${e.type}</span><span style="font-size:0.65rem;color:#666;">${e.timestamp.split('T')[1].split('Z')[0]}</span></div>
        <div style="color:#ccc;">${e.agent}</div>
        <div style="color:#8b949e;margin-top:2px;">${JSON.stringify(e.payload).substring(0,60)}...</div>
        <span class="log-hash">H: ${e.hash.substring(0,24)}...</span>`;
    prepend ? c.prepend(d) : c.appendChild(d);
}

function downloadLog() {
    const data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(STATE.logChain, null, 2));
    const a = document.createElement('a');
    a.href = data;
    a.download = `oracle_audit_${STATE.sessionId}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animId;

function resize() {
    const r = document.getElementById('render-window').getBoundingClientRect();
    canvas.width = r.width;
    canvas.height = r.height;
}
window.addEventListener('resize', resize);
resize();

for(let i=0; i<150; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: Math.random() * 2 + 0.5,
        vx: (Math.random()-0.5) * 1.5,
        vy: (Math.random()-0.5) * 1.5
    });
}

function draw() {
    if (STATE.halted) return;
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.z*1.5, 0, Math.PI*2);
        ctx.fillStyle = `rgba(88,166,255,${0.3+(p.z/4)})`;
        ctx.fill();
    });
    document.getElementById('lidar').innerText = (12000 + Math.random()*500).toFixed(0);
    document.getElementById('pose').innerText = `[${(Date.now()/1000%100).toFixed(2)},1.45,0.00]`;
    animId = requestAnimationFrame(draw);
}
draw();

function updateConfig() {
    STATE.config.delegationLimit = document.getElementById('param-depth').value;
    STATE.config.financialVarianceLimit = document.getElementById('param-variance').value;
    document.getElementById('val-depth').innerText = STATE.config.delegationLimit;
    document.getElementById('val-variance').innerText = STATE.config.financialVarianceLimit;
    logEvent("CONFIG_UPDATE", "SYS_ADMIN", STATE.config);
}

function toggleHalt() {
    STATE.halted = !STATE.halted;
    const badge = document.getElementById('system-status');
    if (STATE.halted) {
        badge.innerText = "HALTED (TIER 0)";
        badge.className = "status-badge status-halted";
        cancelAnimationFrame(animId);
        document.getElementById('mode').innerText = "SAFE";
        document.getElementById('mode').style.color = "var(--danger)";
        logEvent("SYSTEM_HALT", "TIER0_GOVERNOR", { reason: "User" });
        addAgent("TIER 0", "SYSTEM FREEZE. ALL AGENTS HALTED.", "error");
    } else {
        badge.innerText = "SYSTEM ACTIVE";
        badge.className = "status-badge status-active";
        draw();
        document.getElementById('mode').innerText = "AUTO";
        document.getElementById('mode').style.color = "var(--text)";
        logEvent("SYSTEM_RESUME", "TIER0_GOVERNOR", { reason: "User" });
        addAgent("SYSTEM", "Operations resumed.", "normal");
    }
}

function injectRequest() {
    if (STATE.halted) return;
    const id = Math.floor(Math.random()*9999);
    logEvent("USER_REQ", "INTERFACE", { id, intent: "Compliance" });
    addAgent("USER", `Request #${id}: Compliance Check`, "normal");
    setTimeout(() => {
        if (STATE.halted) return;
        addAgent("META-PROMPT", "Generating constraints...", "normal");
        logEvent("PROMPT_GEN", "META_ARCHITECT", { context: "Active" });
        setTimeout(() => {
            if (STATE.halted) return;
            const variance = Math.random() * 0.08;
            const limit = parseFloat(STATE.config.financialVarianceLimit);
            if (variance < limit) {
                addAgent("FIN AGENT", `Variance ${variance.toFixed(3)} OK`, "normal");
                logEvent("EXEC_SUCCESS", "AGENT_FIN", { variance, status: "OK" });
            } else {
                addAgent("TIER 0", `VARIANCE ${variance.toFixed(3)} > LIMIT. BLOCKED.`, "error");
                logEvent("VIOLATION", "TIER0_GOVERNOR", { variance, limit, action: "BLOCK" });
            }
        }, 1000);
    }, 600);
}

function triggerRSI() {
    if (STATE.halted) return;
    addAgent("RSI ENGINE", "Optimizing pathways...", "warning");
    logEvent("RSI_CYCLE", "SELF_IMPROVE", { delta: "+0.4%", nodes: 12 });
}

function addAgent(title, text, type) {
    const c = document.getElementById('agent-monitor');
    const d = document.createElement('div');
    d.className = `agent-card ${type}`;
    d.innerHTML = `<strong>${title}</strong>${text}`;
    c.insertBefore(d, c.firstChild);
    if (c.children.length > 20) c.removeChild(c.lastChild);
}

logEvent("BOOT", "KERNEL", { session: STATE.sessionId, version: "2.3.0" });
</script>
</body>
</html>
